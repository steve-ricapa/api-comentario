org: stevericapa
service: api-comentario

provider:
  name: aws
  runtime: python3.13	
  # Default memory size for functions (default: 1024MB)
  memorySize: 1024
  timeout: 20
  iam:
    role: arn:aws:iam::654654146117:role/LabRole
  environment:
    TABLE_NAME: ${sls:stage}-t_comentarios
    INGESTA_BUCKET: ${sls:stage}-comentarios-ingesta

functions:
  crear:
    handler: comentario.lambda_handler
    events:
      - http:
          path: /comentario/crear
          method: post
          cors: true
          integration: lambda

resources:
  Resources:
    TablaComentarios:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TABLE_NAME}
        AttributeDefinitions:
          - AttributeName: tenant_id
            AttributeType: S
          - AttributeName: uuid
            AttributeType: S
        KeySchema:
          - AttributeName: tenant_id
            KeyType: HASH
          - AttributeName: uuid
            KeyType: RANGE
        # Set the capacity to auto-scale
        BillingMode: PAY_PER_REQUEST
    BucketIngestaComentarios:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.INGESTA_BUCKET}
    PoliticaS3IngestaComentarios:
      Type: AWS::IAM::Policy
      Properties:
        PolicyName: ${sls:stage}-comentarios-ingesta-s3-policy
        Roles:
          - LabRole
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                - arn:aws:s3:::${self:provider.environment.INGESTA_BUCKET}/*
